name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 250 --quiet

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npx jest --ci --passWithNoTests

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --oneline --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Jahera v${{ steps.version.outputs.VERSION }}
          body: |
            ## 🎉 Jahera v${{ steps.version.outputs.VERSION }}

            ### 📝 Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### 📱 Platforms
            - ✅ Android (APK available via EAS Build)
            - ✅ iOS
            - ✅ Web

            ### 📦 Installation
            ```bash
            git clone https://github.com/Kh3rwa1/Jahera_kid_story.git
            cd Jahera_kid_story
            git checkout ${{ github.ref_name }}
            npm install
            npm run dev
            ```
          draft: false
          prerelease: false
          generate_release_notes: true

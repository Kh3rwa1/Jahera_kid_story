name: ✨ Feature Request
description: Suggest a new feature for Jahera
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Jahera better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      description: Which part of the app does this relate to?
      options:
        - Story Generation
        - Voice / Audio
        - UI / Design
        - Offline Mode
        - Parent Controls
        - Onboarding
        - Settings
        - Performance
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots about the feature request.

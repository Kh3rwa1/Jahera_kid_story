name: 🐛 Bug Report
description: Report a bug in Jahera
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I tap on X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) does this affect?
      multiple: true
      options:
        - Android
        - iOS
        - Web
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: Which version of Jahera are you using?
      placeholder: "1.0.1"

  - type: input
    id: device
    attributes:
      label: Device
      description: Which device are you using?
      placeholder: "Pixel 7, iPhone 15, Chrome 125..."

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen recordings
      description: If applicable, add screenshots or recordings to help explain your problem.

  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: If applicable, paste any relevant error logs or console output.
      render: shell
